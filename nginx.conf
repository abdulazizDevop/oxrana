server {
    listen 80;
    server_name 5-129-247-234.sslip.io 5.129.247.234;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://5-129-247-234.sslip.io$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 5-129-247-234.sslip.io;

    ssl_certificate /etc/letsencrypt/live/5-129-247-234.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/5-129-247-234.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
